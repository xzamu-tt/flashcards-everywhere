name: build-apk

# Builds both product flavors (lite + full) on every push to main and on
# every pushed tag. Tag pushes additionally create a GitHub Release with the
# APKs attached as permanent download URLs.
#
# Manual trigger: GitHub UI → Actions → "build-apk" → Run workflow.
#
# Outputs:
#   - Per-run artifacts (90-day retention) downloadable from the Actions tab.
#   - Per-tag GitHub Release with the APKs attached (forever, public link).
#
# Time on a free runner: ~6-8 min cold, ~3-4 min cached.

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Which flavor to build'
        required: true
        default: 'both'
        type: choice
        options: [ both, lite, full ]

permissions:
  contents: write   # needed for the release-on-tag step

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build lite-debug APK
        if: ${{ github.event.inputs.flavor != 'full' }}
        run: ./gradlew assembleLiteDebug --no-daemon --stacktrace

      - name: Build full-debug APK
        if: ${{ github.event.inputs.flavor != 'lite' }}
        run: ./gradlew assembleFullDebug --no-daemon --stacktrace

      - name: Rename APKs with version
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          [ "$VERSION" = "main" ] && VERSION="dev-${GITHUB_SHA::7}"
          mkdir -p artifacts
          if [ -f app/build/outputs/apk/lite/debug/app-lite-debug.apk ]; then
            cp app/build/outputs/apk/lite/debug/app-lite-debug.apk \
               "artifacts/flashcards-everywhere-${VERSION}-lite.apk"
          fi
          if [ -f app/build/outputs/apk/full/debug/app-full-debug.apk ]; then
            cp app/build/outputs/apk/full/debug/app-full-debug.apk \
               "artifacts/flashcards-everywhere-${VERSION}-full.apk"
          fi
          ls -lh artifacts

      - name: Upload artifacts (90-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: flashcards-everywhere-apks
          path: artifacts/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Flashcards Everywhere ${{ github.ref_name }}

            **APK downloads** (debug-signed with the repo's committed `app/debug.keystore` — stable across releases, so Obtainium can update without uninstalling).

            > ⚠️ Do **not** install by tapping the APK in a browser/messenger — Google Play Protect's Enhanced Fraud Protection may block sideloads from those sources. Install via [Obtainium](https://github.com/ImranR98/Obtainium), the F-Droid client, or `adb install`. See the [README install section](https://github.com/${{ github.repository }}#install) for details.

            - `flashcards-everywhere-${{ github.ref_name }}-lite.apk` — Play Store flavor (notifications + widget + lockscreen + UsageStats pacing)
            - `flashcards-everywhere-${{ github.ref_name }}-full.apk` — F-Droid + GitHub Releases flavor (functionally equivalent to lite today; reserved for M7 enforcement features)

            See [README](https://github.com/${{ github.repository }}#status) for what's working in this build.
